<svg xmlns="http://www.w3.org/2000/svg" width="880" height="220" viewBox="0 0 880 220">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c862"/>
      <stop offset="100%" style="stop-color:#c4923a"/>
    </linearGradient>
    <linearGradient id="dark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="880" height="220" fill="#0a0a0a"/>
  <!-- Gold left panel -->
  <rect width="220" height="220" fill="url(#gold)"/>
  <!-- § circle -->
  <circle cx="110" cy="90" r="42" fill="none" stroke="#0a0a0a" stroke-width="4"/>
  <text x="110" y="105" font-family="ui-monospace, monospace" font-size="48" font-weight="700" fill="#0a0a0a" text-anchor="middle">§</text>
  <text x="110" y="150" font-family="ui-monospace, monospace" font-size="11" font-weight="800" fill="#0a0a0a" text-anchor="middle" letter-spacing="4" opacity="0.7">SIGRANK</text>
  <!-- Yield symbol -->
  <text x="110" y="195" font-family="ui-monospace, monospace" font-size="28" font-weight="900" fill="#0a0a0a" text-anchor="middle" opacity="0.5">Υ</text>
  <!-- Right panel text -->
  <text x="250" y="60" font-family="ui-monospace, monospace" font-size="28" font-weight="900" fill="#f0c862">djm</text>
  <text x="250" y="95" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#8ae89a">structural accountability for AI systems</text>
  <text x="250" y="125" font-family="ui-monospace, monospace" font-size="12" font-weight="600" fill="#e0e0d0" opacity="0.7">conservation law · governance framework · operator leaderboard</text>
  <text x="250" y="165" font-family="ui-monospace, monospace" font-size="11" font-weight="600" fill="#6e8a6e">Υ = (cache_read × output) / input²</text>
  <text x="250" y="195" font-family="ui-monospace, monospace" font-size="11" font-weight="600" fill="#5a8a5a" opacity="0.6">the moat is a law, not a feature</text>
  <!-- Diamond divider -->
  <rect x="845" y="15" width="8" height="8" fill="#c4923a" transform="rotate(45 849 19)"/>
  <rect x="845" y="197" width="8" height="8" fill="#c4923a" transform="rotate(45 849 201)"/>
</svg>
