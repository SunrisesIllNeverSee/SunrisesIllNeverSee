<svg xmlns="http://www.w3.org/2000/svg" width="880" height="260" viewBox="0 0 880 260">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c862"/>
      <stop offset="100%" style="stop-color:#c4923a"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8ae89a;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#8ae89a;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="880" height="260" fill="#0a0a0a"/>
  <!-- Gold left panel -->
  <rect width="200" height="260" fill="url(#gold)"/>
  <!-- § circle -->
  <circle cx="100" cy="100" r="40" fill="none" stroke="#0a0a0a" stroke-width="4"/>
  <text x="100" y="115" font-family="ui-monospace, monospace" font-size="44" font-weight="700" fill="#0a0a0a" text-anchor="middle">§</text>
  <text x="100" y="160" font-family="ui-monospace, monospace" font-size="10" font-weight="800" fill="#0a0a0a" text-anchor="middle" letter-spacing="4" opacity="0.7">SIGRANK</text>
  <!-- Yield -->
  <text x="100" y="210" font-family="ui-monospace, monospace" font-size="36" font-weight="900" fill="#0a0a0a" text-anchor="middle" opacity="0.4">Υ</text>
  <text x="100" y="240" font-family="ui-monospace, monospace" font-size="9" font-weight="600" fill="#0a0a0a" text-anchor="middle" opacity="0.3">Sovereign Signal Governance</text>

  <!-- Right panel -->
  <text x="230" y="50" font-family="ui-monospace, monospace" font-size="32" font-weight="900" fill="#f0c862">djm</text>

  <!-- The four-line manifesto -->
  <text x="230" y="85" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#8ae89a">Language is the medium.</text>
  <text x="230" y="110" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#e0e0d0">Execution is the problem.</text>
  <text x="230" y="135" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#f0c862">Measurement is the wedge.</text>
  <text x="230" y="160" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#c4923a">Governance is the expansion.</text>

  <!-- Formula -->
  <text x="230" y="200" font-family="ui-monospace, monospace" font-size="12" font-weight="600" fill="#6e8a6e">Υ = (cache_read × output) / input²</text>

  <!-- Tagline -->
  <text x="230" y="230" font-family="ui-monospace, monospace" font-size="11" font-weight="600" fill="#5a8a5a" opacity="0.7">this is not philosophy. this is physics.</text>

  <!-- Diamond dividers -->
  <rect x="845" y="15" width="8" height="8" fill="#c4923a" transform="rotate(45 849 19)"/>
  <rect x="845" y="237" width="8" height="8" fill="#c4923a" transform="rotate(45 849 241)"/>
</svg>
